<!DOCTYPE html>
<!--
  Datei: index.html
  Diese HTML-Datei ist der Einstiegspunkt für das React-Frontend. Sie enthält nur das Root-DIV,
  in das React hineinrendert, und lädt das JavaScript aus src/main.jsx.
  Verbindung: main.jsx mountet die React-App auf #root.
-->
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wissenstest UML</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
