EFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="184.3804" x="461.5024" y="4286.106">Sicherheitsmassnahmen:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="4.1323" x="461.5024" y="4301.2388">&#160;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="12.4033" x="461.5024" y="4316.3716">1.</text><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="137.5981" x="478.0381" y="4316.3716">Passwort-Hashing:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="139.4644" x="473.8994" y="4331.5044">- PBKDF2 oder bcrypt</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="129.2954" x="473.8994" y="4346.6372">- Mit zuf&#228;lligem Salt</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="186.2529" x="473.8994" y="4361.77">- Nicht im Klartext speichern</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="4.1323" x="461.5024" y="4376.9028">&#160;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="12.4033" x="461.5024" y="4392.0356">2.</text><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="162.5825" x="478.0381" y="4392.0356">Session-Management:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="115.0767" x="473.8994" y="4407.1685">- HttpOnly Cookie</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="153.4165" x="473.8994" y="4422.3013">- Secure Flag f&#252;r HTTPS</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="124.3696" x="473.8994" y="4437.4341">- SameSite = Strict</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="133.9609" x="473.8994" y="4452.5669">- Ablauf nach 30 Min</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="4.1323" x="461.5024" y="4467.6997">&#160;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="12.4033" x="461.5024" y="4482.8325">3.</text><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="133.9038" x="478.0381" y="4482.8325">Authentifizierung:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="169.5015" x="473.8994" y="4497.9653">- SQL-Injection pr&#228;vention</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="200.5415" x="473.8994" y="4513.0981">- Generische Fehlermeldungen</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="157.8853" x="473.8994" y="4528.231">- Login-Versuche loggen</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="4.1323" x="461.5024" y="4543.3638">&#160;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="12.4033" x="461.5024" y="4558.4966">4.</text><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="246.2002" x="478.0381" y="4558.4966">Rollen-Basierte Zugriffskontrolle:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="129.1431" x="473.8994" y="4573.6294">- role aus users.role</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="203.6772" x=