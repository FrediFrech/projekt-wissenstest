13" font-weight="bold" lengthAdjust="spacing" textLength="110.7983" x="285.6074" y="2254.4653">HTTP Stateless</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="200.4653" x="396.4058" y="2254.4653">: Jeder Request ist unabh&#228;ngig</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="12.4033" x="269.0718" y="2269.5981">2.</text><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="64.0352" x="285.6074" y="2269.5981">Sessions</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="201.9443" x="349.6426" y="2269.5981">: Cookies verkn&#252;pfen Requests</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="12.4033" x="269.0718" y="2284.731">3.</text><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="141.7495" x="285.6074" y="2284.731">Connection Pooling</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="238.748" x="427.3569" y="2284.731">: HikariCP recycelt DB-Verbindungen</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="12.4033" x="269.0718" y="2299.8638">4.</text><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="186.5957" x="285.6074" y="2299.8638">Transaction Management</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="111.23" x="472.2031" y="2299.8638">: ACID-Properties</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="12.4033" x="269.0718" y="2314.9966">5.</text><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="107.2563" x="285.6074" y="2314.9966">Error Handling</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="145.2153" x="392.8638" y="2314.9966">: Try-Catch &amp; Rollback</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="12.4033" x="269.0718" y="2330.1294">6.</text><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="60.6963" x="285.6074" y="2330.1294">Security</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="320.8359" x="346.3037" y="2330.1294">: SQL Injection Prevention (Prepared Statements)</text><?plantuml-src jLTjRzf84FxEhnZrmybma9IqwOT8z0ION6X38DXtqPqYeSMUm0Pxb-wkG-dloS_8D_xOpTgObnGIebCZ5CnwdfdPcMUUjGqt4OABqqZEOnIcud8sKYoEmKSUmIbKe9y8msE4hpAE4y4dp70f2eKfKuO7VCg4WNSD9MSQrQrmcX4dDyLtm3Gq-jqRhzNVDlLb7313bXwg1rIPfT_jDEl-jk4Njz44L_67r6zFQZDIw5rVPWXxTzj-RK7cBZDio3HcncwZKAZLm3D9ICc1DeH3GrlK1cgrGc6PA5G-VrwcSWQzhkV3yOph2K78y3ZzbqB9_uNlzw2Ftn9QB1POOFW3CvZlev1zR_cpmUoM8pH7eRJ9EiMNx7Y0Hsaqk-0aLDrsk1DmRNEWbhXC7etGz9a8PPmlQgTegy7lxdYGH6OErSg7ubP-jf1duBKkMqqVId3UxtRWMuw-5JSNhNuBmfM3sicjwFPTAbRZ7-ZNhznknod2PRlJzg7wVbs9j3-5j8SsYjkW6DUNDbar1vRekyNJMA5O0wX7RcDbczbHwvaQ8ZTak76p-Xx-9NQYW1-9MZm5an4EbnRh7VLHKxuUcaA8cq6MEUsgOAKxlCU9mKr4jeyTPV_YzOve0o4gsdy5pXKRKK9C_41E5ok4XIpfTGONVkVI9ZQbqY8uAGQgnSruEOCsw3f4ulTCffJD80TpbWazGtMias7CBMthcIFuFNDKQRk_ZhmFBE8X-QsdEJXPAZjH3LGOZ0L2Bn6s_0KM6SXJdKYbg2a5eByTsAdamkW1cp4LOWWrIqACgBevtX1JPiWr7kpXTDl17OjqC3uOJU55k6F2sbVKBP--_2umOp2Uca5M4veo9r_XONarVUcF4UcVM1gMdqKhlZfkMT1zGzOYPqG3q5FamHZLyn7gVdrzThma253h_IEpDG1NYyTWhCacux5Z1s8V_LDr7g8TCV56bROTU0kjBLq9aohjiXDxnFPFr2msqvIdb5p6Mx7BqWl6IIJafXaurSgdNUhxLy-j-wsS5fhKsByLHXeM3RAEr_ueGyo-ht_T2ZgbGxJhOQBI8tcWCP0YfBklqYABjuyMzImDO1EJq0nhZWf_2JNsgsbBaQGBhcbgT_9eVP_EXfTfL0zZBe2cp60KlLr0BVeudyZZG26vftbDtOHe68_qOHAQvd68XguCBIkpWFa1vHHV4PQDWzinyocIOYX9lInldE1bo9o6W-7y_of8Lirz-h4XP2IC7qyEFucXxVvCcqZAAPmldXJSK-bN