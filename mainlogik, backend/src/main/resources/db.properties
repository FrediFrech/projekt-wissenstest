# Datei: db.properties
# Diese Datei enthält die Zugangsdaten zur Datenbank und ist bewusst außerhalb des Codes,
# damit man später beim Deployment nur die Konfiguration ändern muss. DbConnectionManager
# liest diese Werte und erstellt den Connection-Pool.
db.url=jdbc:postgresql://localhost:5433/wissentest
# For university server, use the MS SQL credentials only if required by deployment docs
# db.url=jdbc:sqlserver://localhost:1433;databaseName=studentX

db.user=student
db.password=student

db.pool.maxSize=10
